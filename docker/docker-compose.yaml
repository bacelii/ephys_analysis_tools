services:
  ephys-analysis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ephys_analysis_tools
    ports:
      - "8895:8888"
    volumes:
      - ../:/workspace/ephys_analysis_tools
    working_dir: /workspace/ephys_analysis_tools
    command: >
      bash -lc "pip install -e . &&
      exec jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --ServerApp.token=''
      --ServerApp.password=''
      --ServerApp.allow_origin='*'
      --ServerApp.root_dir=/workspace/ephys_analysis_tools
      --allow-root"
